<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <header class="top-bar">
            <button id="theme-toggle" class="btn-secondary">Mode Gelap</button>
        </header>

        <section class="card greeting-section">
            <div id="digital-clock" class="clock-display">00:00:00</div>
            <div id="current-date" class="date-display">Hari, Tanggal Bulan Tahun</div>
            <h1 class="greeting-text">
                <span id="time-greeting">Selamat Pagi</span>, 
                <span id="user-name" contenteditable="true">Pengguna</span>
            </h1>
        </section>

        <main class="dashboard-grid">

            <section class="card timer-card">
                <h2>Focus Timer</h2>
                <div id="timer-display" class="timer-display">25:00</div>
                
                <div class="timer-settings">
                    <label for="timer-duration">Durasi (menit): </label>
                    <input type="number" id="timer-duration" value="25" min="1" max="60">
                </div>

                <div class="timer-controls">
                    <button id="start-timer" class="btn-primary">Start</button>
                    <button id="stop-timer" class="btn-danger">Stop</button>
                    <button id="reset-timer" class="btn-secondary">Reset</button>
                </div>
            </section>

            <section class="card todo-card">
                <h2>Tasks</h2>
                <form id="todo-form" class="input-group">
                    <input type="text" id="todo-input" placeholder="Tambah tugas baru..." required>
                    <button type="submit" class="btn-primary">Add</button>
                </form>
                <ul id="todo-list" class="list-container">
                    </ul>
            </section>

            <section class="card links-card">
                <h2>Quick Links</h2>
                <form id="links-form" class="input-row">
                    <input type="text" id="link-name" placeholder="Nama Link" required>
                    <input type="url" id="link-url" placeholder="URL (https://...)" required>
                    <button type="submit" class="btn-primary">Add Link</button>
                </form>
                <div id="links-container" class="links-grid">
                    </div>
            </section>

        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
